# Application Configuration
spring.application.name=digital-twin-backend
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/digitaltwin_db}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:digitaltwin_db}

# MongoDB GridFS for large file storage (audio, video, images, PDFs)
spring.data.mongodb.gridfs.database=digitaltwin_db
spring.data.mongodb.gridfs.bucket=fs

# Session Configuration (MongoDB-based sessions)
spring.session.store-type=mongodb
spring.session.mongodb.collection-name=sessions
# Session timeout (30 minutes)
spring.session.timeout=30m

# File Upload Configuration (for audio, video, image, PDF)
spring.servlet.multipart.enabled=true
# Max file size: 100MB
spring.servlet.multipart.max-file-size=100MB
# Max request size: 100MB
spring.servlet.multipart.max-request-size=100MB
# Temporary file location
spring.servlet.multipart.location=/tmp

# Logging Configuration
logging.level.root=INFO
logging.level.com.digitaltwin.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# Security Configuration
# CORS Configuration (for React frontend)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,heart-beat,destination,content-length
app.cors.allow-credentials=true
app.cors.exposed-headers=Access-Control-Allow-Origin,Access-Control-Allow-Credentials

# Application specific configurations
# AI Service Configuration (we'll add API keys later)
# AI Service Configuration
app.ai.api.key=${APP_AI_API_KEY:}
app.ai.service.url=https://openrouter.ai/api/v1

# Emergency Alert Configuration
app.emergency.sms.enabled=true
app.emergency.email.enabled=true

# Blockchain Configuration (we'll configure later)
app.blockchain.enabled=false
app.blockchain.network.url=http://localhost:8545

# Actuator endpoints (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# File storage path (local storage for temporary files)
app.file.upload-dir=./uploads
app.file.temp-dir=./temp


## Email Server Settings
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optional: Connection timeout
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.assemblyai.api.key=${APP_ASSEMBLYAI_API_KEY:}



twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.enabled=${TWILIO_ENABLED:true}




# ============= WEBSOCKET CONFIGURATION =============
spring.websocket.max-text-message-size=524288
spring.websocket.max-binary-message-size=524288
spring.messaging.stomp.heartbeat-incoming=25000
spring.messaging.stomp.heartbeat-outgoing=25000
server.tomcat.max-connections=10000
server.tomcat.max-threads=200
server.tomcat.connection-timeout=30000

# ============= WEBSOCKET DEBUG LOGGING =============
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.org.springframework.messaging.simp=DEBUG
logging.level.org.springframework.messaging.simp.stomp=DEBUG
logging.level.com.digitaltwin.digital_twin_backend.websocket=DEBUG