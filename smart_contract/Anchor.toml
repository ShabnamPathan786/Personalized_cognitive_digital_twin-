[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
orderbook = "Dt5N4RsBurrVSfFqNxsbBtNKfodYFSHtsCCXYjh9dsdZ"

[registry]
url = "https://api.apr.dev"

[provider]
